<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>개인정보처리방침 — 부비서</title>
  <meta name="description" content="부비서 개인정보처리방침" />
  <link rel="icon" type="image/png" href="assets/logo.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="legal.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <header class="legal-nav">
    <a class="legal-nav__brand" href="index.html" aria-label="부비서 홈">
      <img src="assets/logo.png" alt="" />
      <span>부비서</span>
    </a>
    <a class="legal-nav__back" href="index.html">← 홈으로</a>
  </header>

  <main class="legal" id="content">
    <p class="legal__loading">불러오는 중...</p>
  </main>

  <footer class="legal-foot">
    © 2026 부비서. All rights reserved.
  </footer>

  <script>
    fetch('privacy.md').then(r => r.text()).then(md => {
      document.getElementById('content').innerHTML = marked.parse(md);
    }).catch(e => {
      document.getElementById('content').innerHTML = '<p>약관을 불러오지 못했습니다.</p>';
    });
  </script>
</body>
</html>
